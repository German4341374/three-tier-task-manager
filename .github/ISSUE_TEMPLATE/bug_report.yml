name: Bug report
description: Report reproducible behavior without secrets or production data.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction and sanitized logs
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Docker version, OS, and Compose version
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I removed credentials, task data, and personal information.
          required: true
