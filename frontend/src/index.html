<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A small three-tier task manager for a DevOps portfolio.">
    <title>Task Manager</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="container">
      <header>
        <p class="eyebrow">THREE-TIER DEVOPS DEMO</p>
        <h1>Task Manager</h1>
        <p>FastAPI, PostgreSQL, Docker Compose, and Nginx.</p>
      </header>

      <form id="task-form" class="task-form">
        <label for="title">New task</label>
        <div class="form-row">
          <input id="title" name="title" maxlength="200" required placeholder="Document the deployment">
          <button type="submit">Add task</button>
        </div>
      </form>

      <section aria-labelledby="task-heading">
        <div class="section-heading">
          <h2 id="task-heading">Tasks</h2>
          <span id="task-count" aria-live="polite">0 open</span>
        </div>
        <p id="status" class="status" role="status"></p>
        <ul id="task-list" class="task-list"></ul>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
