name: three-tier-task-manager

services:
  proxy:
    image: nginxinc/nginx-unprivileged:1.27.4-alpine3.21
    user: "101:101"
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - edge
      - app_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  frontend:
    build:
      context: ./frontend
      target: production
    image: task-manager-frontend:1.0.0
    user: "101:101"
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  backend:
    build:
      context: ./backend
      target: production
    image: task-manager-backend:1.0.0
    user: "10001:10001"
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-production}
      APP_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:?Set POSTGRES_DB}
      APP_ALLOWED_HOSTS: ${APP_ALLOWED_HOSTS:-localhost,127.0.0.1,proxy}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2)"]
      interval: 15s
      timeout: 3s
      start_period: 20s
      retries: 5
    stop_grace_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  db:
    image: postgres:17.4-alpine3.21
    user: "70:70"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

volumes:
  postgres_data:
    name: task_manager_postgres_data

networks:
  edge:
  app_internal:
    internal: true
